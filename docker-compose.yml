services:
  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    ports:
      - "5432:5432"
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.26.2
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgresql
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    volumes:
      - ./temporal-config:/etc/temporal/config/dynamicconfig

  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

  go-worker:
    build: ./go-worker
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      GO_TASK_QUEUE: go-task-queue
    restart: on-failure

  nestjs-worker:
    build: ./nestjs-worker
    depends_on:
      temporal:
        condition: service_started
      mysql:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      NESTJS_TASK_QUEUE: nestjs-task-queue
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: invoice
      MYSQL_PASSWORD: invoice
      MYSQL_DATABASE: invoices
      MYSQL_SYNCHRONIZE: "true"
    restart: on-failure

  # App database (separate from Temporal's PostgreSQL)
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: invoices
      MYSQL_USER: invoice
      MYSQL_PASSWORD: invoice
    ports:
      - "3306:3306"
    volumes:
      - app-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  # Database browser for MySQL
  adminer:
    image: adminer:4
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    ports:
      - "8081:8080"

volumes:
  temporal-postgres-data:
  app-mysql-data:
